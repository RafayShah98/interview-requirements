# LiteAPI Hotel Search — logging configuration
#
# By default only INFO and above is shown.
# To enable verbose debug output, run with:
#   ./gradlew run --args="--debug"
# or set the environment variable:
#   LITEAPI_DEBUG=true ./gradlew run

handlers=java.util.logging.ConsoleHandler
java.util.logging.ConsoleHandler.level=ALL
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format=[%4$-7s] %5$s%6$s%n

# Root level — change to FINE to see all debug output
.level=INFO
com.liteapi.level=INFO
